<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serviços · PropostaPRO</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav-container"></div>

<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Serviços</h1>
      <p class="page-subtitle">Catálogo de serviços disponíveis para propostas</p>
    </div>
    <button class="btn btn-primary" onclick="openModal()">＋ Novo Serviço</button>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Nome</th>
          <th>Descrição</th>
          <th>Valor Padrão</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">🔧</div><div class="empty-state-text">Carregando...</div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="modal-title">Novo Serviço</h3>
      <button class="btn-icon" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nome *</label>
      <input type="text" id="s-nome" class="form-control" placeholder="Ex: Desenvolvimento Frontend">
    </div>
    <div class="form-group">
      <label class="form-label">Descrição</label>
      <textarea id="s-descricao" class="form-control" rows="2" placeholder="Descrição do serviço..."></textarea>
    </div>
    <div class="form-group">
      <label class="form-label">Valor Padrão (R$)</label>
      <input type="number" id="s-valor" class="form-control" min="0" step="0.01" value="0">
    </div>
    <div id="modal-error" class="alert alert-danger" style="display:none"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="salvar()">Salvar</button>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
let editId = null;

(async () => {
  const res = await fetch('/components/nav.html');
  document.getElementById('nav-container').innerHTML = await res.text();
  setActiveNav('servicos');
  await carregarServicos();
})();

async function carregarServicos() {
  const tbody = document.getElementById('tbody');
  try {
    const servicos = await API.listarServicos();
    if (!servicos.length) {
      tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state"><div class="empty-state-icon">🔧</div><div class="empty-state-text">Nenhum serviço cadastrado</div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = servicos.map(s => `
      <tr>
        <td class="text-muted">#${s.id}</td>
        <td><strong>${s.nome}</strong></td>
        <td class="text-muted">${s.descricao || '—'}</td>
        <td><strong>${formatBRL(s.valor_padrao)}</strong></td>
        <td>
          <div class="td-actions">
            <button onclick="openModal(${JSON.stringify(s).replace(/"/g,'&quot;')})" class="btn btn-sm btn-secondary">✏️ Editar</button>
            <button onclick="excluir(${s.id})" class="btn btn-sm btn-danger">🗑 Excluir</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch(e) { toast(e.message, 'error'); }
}

function openModal(s = null) {
  editId = s ? s.id : null;
  document.getElementById('modal-title').textContent = s ? 'Editar Serviço' : 'Novo Serviço';
  document.getElementById('s-nome').value = s ? s.nome : '';
  document.getElementById('s-descricao').value = s ? (s.descricao || '') : '';
  document.getElementById('s-valor').value = s ? s.valor_padrao : 0;
  document.getElementById('modal-error').style.display = 'none';
  document.getElementById('modal').classList.add('open');
}
function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

async function salvar() {
  const nome = document.getElementById('s-nome').value.trim();
  const descricao = document.getElementById('s-descricao').value.trim();
  const valor_padrao = parseFloat(document.getElementById('s-valor').value) || 0;
  const errEl = document.getElementById('modal-error');
  if (!nome) { errEl.textContent = 'Nome é obrigatório'; errEl.style.display = ''; return; }
  errEl.style.display = 'none';
  try {
    if (editId) {
      await API.editarServico(editId, { nome, descricao, valor_padrao });
      toast('Serviço atualizado!');
    } else {
      await API.criarServico({ nome, descricao, valor_padrao });
      toast('Serviço criado!');
    }
    closeModal();
    await carregarServicos();
  } catch(e) { errEl.textContent = e.message; errEl.style.display = ''; }
}

async function excluir(id) {
  if (!confirmDialog('Excluir este serviço?')) return;
  try {
    await API.excluirServico(id);
    toast('Serviço excluído!');
    await carregarServicos();
  } catch(e) { toast(e.message, 'error'); }
}
</script>
</body>
</html>
