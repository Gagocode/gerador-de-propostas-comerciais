<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Propostas · PropostaPRO</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div id="nav-container"></div>

<div class="page">
  <div class="page-header">
    <div>
      <h1 class="page-title">Propostas</h1>
      <p class="page-subtitle">Gerencie todas as suas propostas comerciais</p>
    </div>
    <a href="/pages/proposta-form.html" class="btn btn-primary">
      <span>＋</span> Nova Proposta
    </a>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Título</th>
          <th>Cliente</th>
          <th>Status</th>
          <th>Valor Total</th>
          <th>Atualizado em</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📄</div><div class="empty-state-text">Carregando...</div></div></td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
(async () => {
  const res = await fetch('/components/nav.html');
  document.getElementById('nav-container').innerHTML = await res.text();
  setActiveNav('propostas');

  const tbody = document.getElementById('tbody');
  try {
    const propostas = await API.listarPropostas();
    if (!propostas.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty-state"><div class="empty-state-icon">📄</div><div class="empty-state-text">Nenhuma proposta ainda. <a href="/pages/proposta-form.html">Criar primeira proposta</a></div></div></td></tr>`;
      return;
    }
    tbody.innerHTML = propostas.map(p => `
      <tr>
        <td class="text-muted">#${p.id}</td>
        <td><strong>${p.titulo}</strong></td>
        <td>${p.cliente ? p.cliente.nome : '<span class="text-muted">—</span>'}</td>
        <td>${badgeHtml(p.status)}</td>
        <td><strong>${formatBRL(p.valor_total)}</strong></td>
        <td class="text-muted">${formatDate(p.updated_at)}</td>
        <td>
          <div class="td-actions">
            <a href="/pages/proposta-view.html?id=${p.id}" class="btn btn-sm btn-secondary" title="Visualizar">👁</a>
            ${p.status === 'rascunho'
              ? `<a href="/pages/proposta-form.html?id=${p.id}" class="btn btn-sm btn-secondary" title="Editar">✏️</a>`
              : ''}
            <button onclick="duplicar(${p.id})" class="btn btn-sm btn-secondary" title="Duplicar">⧉</button>
          </div>
        </td>
      </tr>
    `).join('');
  } catch (e) {
    toast(e.message, 'error');
  }
})();

async function duplicar(id) {
  if (!confirmDialog('Duplicar esta proposta?')) return;
  try {
    const nova = await API.duplicarProposta(id);
    toast('Proposta duplicada com sucesso!', 'success');
    setTimeout(() => window.location.reload(), 800);
  } catch(e) {
    toast(e.message, 'error');
  }
}
</script>
</body>
</html>
